    <!-- MENU MOBILE -->     
    <script>
        var el = document.querySelector('.menu-mobile-icon');
        el.addEventListener('click',()=>{
           // Queremos mostrar o menu
           var menuItems = document.querySelector('.menu-items');
           if(menuItems.classList.contains('show')){
            menuItems.classList.add('hidde');
            menuItems.classList.remove('show');
           }else{
            menuItems.classList.add('show');
            menuItems.classList.remove('hidde');
           }
           
        });


        //////////////

        const loaderContainer = document.createElement('div');
        loaderContainer.style.cssText = `
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        `;

        const loader = document.createElement('div');
        loader.style.cssText = `
            border: 16px solid #f3f3f3;
            border-top: 16px solid #3498db;
            border-radius: 50%;
            width: 80px;
            height: 80px;
            animation: spin 1s linear infinite;
        `;

        loaderContainer.appendChild(loader);
        document.body.appendChild(loaderContainer);

        // Função para ocultar a tela de carregamento quando a página estiver totalmente carregada
        window.addEventListener('load', () => {
            loaderContainer.style.display = 'none';
        });
    </script>
