<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Página não encontrada – Instituto Galvão Azevedo</title>
  <link rel="icon" href="logo.png" type="image/png" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Nunito', sans-serif;
      background: #1a1a2e;
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .container { max-width: 500px; }
    img { width: 120px; margin: 0 auto 24px; border-radius: 50%; background: white; padding: 8px; }
    h1 { font-size: 5rem; font-weight: 900; color: #FFC107; margin-bottom: 8px; }
    h2 { font-size: 1.5rem; font-weight: 800; margin-bottom: 16px; }
    p { color: rgba(255,255,255,0.65); margin-bottom: 32px; }
    a {
      background: linear-gradient(135deg, #FF9800, #F44336);
      color: white;
      padding: 14px 32px;
      border-radius: 50px;
      font-weight: 700;
      text-decoration: none;
      display: inline-block;
      transition: all 0.3s;
    }
    a:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(244,67,54,0.4); }
  </style>
</head>
<body>
  <div class="container">
    <img src="logo.png" alt="Logo Instituto Galvão Azevedo" />
    <h1>404</h1>
    <h2>Página não encontrada</h2>
    <p>Ops! A página que você está procurando não existe ou foi movida.</p>
    <a href="index.html">← Voltar ao Início</a>
  </div>
</body>
</html>
